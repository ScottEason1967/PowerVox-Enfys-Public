      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags – manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin – blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec – re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

 1840 × 700 px (page ratio ≈ 1.31 wide:tall).\n     Vertical center on 1920×1080 canvas: 190px top/bottom margin. */\n  .book {\n    width: 1840px;\n    height: 700px;\n    margin: 190px auto 0;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    position: relative;\n    filter: drop-shadow(0 28px 36px rgba(50,35,20,0.18))\n            drop-shadow(0 8px 14px rgba(50,35,20,0.10));\n  }\n  .book::before {\n    content: \"\";\n    position: absolute; left: 50%; top: 0; bottom: 0; width: 56px;\n    transform: translateX(-50%);\n    background: linear-gradient(90deg,\n        rgba(0,0,0,0) 0%,\n        rgba(60,40,25,0.16) 35%,\n        rgba(40,25,15,0.32) 50%,\n        rgba(60,40,25,0.16) 65%,\n        rgba(0,0,0,0) 100%);\n    pointer-events: none;\n    z-index: 4;\n  }\n\n  .page {\n    background: var(--paper);\n    position: relative;\n    overflow: hidden;\n  }\n  .page.left  { border-radius: 4px 0 0 4px; }\n  .page.right { border-radius: 0 4px 4px 0; }\n\n  /* paper grain */\n  .page::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse at 15% 10%, rgba(255,255,255,0.45), transparent 55%),\n      radial-gradient(ellipse at 85% 88%, rgba(120,90,50,0.10), transparent 55%),\n      radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(120,90,50,0.06) 100%);\n    pointer-events: none;\n    mix-blend-mode: multiply;\n    opacity: 0.85;\n    z-index: 2;\n  }\n  .page.left::before {\n    content: \"\"; position: absolute; top:0; bottom:0; right: 0; width: 70px;\n    background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(40,20,10,0.10) 100%);\n    pointer-events: none; z-index: 3;\n  }\n  .page.right::before {\n    content: \"\"; position: absolute; top:0; bottom:0; left: 0; width: 70px;\n    background: linear-gradient(-90deg, rgba(0,0,0,0) 0%, rgba(40,20,10,0.10) 100%);\n    pointer-events: none; z-index: 3;\n  }\n\n  .folio {\n    position: absolute; bottom: 22px;\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 14px; font-style: italic;\n    color: var(--ink-soft); letter-spacing: 0.06em;\n    z-index: 6;\n  }\n  .page.left  .folio { left: 38px; }\n  .page.right .folio { right: 38px; }\n\n  /* ===== WATERCOLOR FRAMES (with drag-and-drop image-slot) ====== */\n  .illus-frame {\n    position: absolute; inset: 36px;\n    border-radius: 4px;\n    overflow: hidden;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset,\n                0 0 0 1px rgba(60,40,20,0.06);\n  }\n  .illus-frame.fullbleed { inset: 0; border-radius: 0; }\n  .illus-frame.bleed-page { inset: 0; }\n  .illus-frame image-slot {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    color: rgba(60,50,40,0.55);\n  }\n  image-slot::part(frame) { background: transparent; }\n  image-slot::part(ring)  { border-color: rgba(60,40,20,0.12); border-width: 1px; }\n\n  /* watercolor bloom variants */\n  .bloom-warm {\n    background:\n      radial-gradient(ellipse 60% 50% at 18% 22%, color-mix(in oklch, var(--rose), white 18%) 0%, transparent 62%),\n      radial-gradient(ellipse 55% 45% at 78% 28%, color-mix(in oklch, var(--peach), white 18%) 0%, transparent 62%),\n      radial-gradient(ellipse 50% 42% at 70% 75%, color-mix(in oklch, var(--sky), white 18%) 0%, transparent 62%),\n      radial-gradient(ellipse 48% 38% at 22% 80%, color-mix(in oklch, var(--sage), white 18%) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 28% at 50% 55%, color-mix(in oklch, var(--butter), white 25%) 0%, transparent 65%),\n      var(--paper);\n  }\n  .bloom-cold {\n    background:\n      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(180,195,210,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 55% 45% at 75% 70%, rgba(170,180,195,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 45% 38% at 60% 25%, rgba(200,210,220,0.45) 0%, transparent 62%),\n      radial-gradient(ellipse 40% 32% at 30% 70%, rgba(195,200,210,0.40) 0%, transparent 60%),\n      color-mix(in oklch, var(--paper), #b8c4d0 18%);\n  }\n  .bloom-grey {\n    background:\n      radial-gradient(ellipse 55% 50% at 25% 30%, rgba(160,160,165,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 50% 45% at 75% 65%, rgba(170,170,175,0.5) 0%, transparent 62%),\n      radial-gradient(ellipse 40% 35% at 55% 50%, rgba(150,150,160,0.4) 0%, transparent 60%),\n      color-mix(in oklch, var(--paper), #aaaaaa 25%);\n  }\n  .bloom-dark {\n    background:\n      radial-gradient(ellipse 60% 50% at 30% 25%, rgba(90,95,115,0.6) 0%, transparent 62%),\n      radial-gradient(ellipse 55% 45% at 75% 75%, rgba(75,80,100,0.65) 0%, transparent 62%),\n      radial-gradient(ellipse 40% 35% at 50% 50%, rgba(110,115,130,0.4) 0%, transparent 60%),\n      #3a3d52;\n  }\n  .bloom-rainbow {\n    background:\n      radial-gradient(ellipse 35% 35% at 15% 25%, rgba(238,140,140,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 40% 18%, rgba(245,200,140,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 65% 22%, rgba(245,225,140,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 88% 32%, rgba(170,210,150,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 20% 75%, rgba(160,200,225,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 50% 80%, rgba(180,180,225,0.55) 0%, transparent 62%),\n      radial-gradient(ellipse 35% 35% at 78% 72%, rgba(210,170,220,0.55) 0%, transparent 62%),\n      var(--paper);\n  }\n  .bloom-sage {\n    background:\n      radial-gradient(ellipse 60% 50% at 25% 30%, color-mix(in oklch, var(--sage), white 5%) 0%, transparent 62%),\n      radial-gradient(ellipse 55% 45% at 75% 70%, color-mix(in oklch, var(--sky), white 10%) 0%, transparent 62%),\n      radial-gradient(ellipse 40% 35% at 60% 25%, color-mix(in oklch, var(--butter), white 15%) 0%, transparent 60%),\n      var(--paper);\n  }\n  .bloom-dawn {\n    background:\n      radial-gradient(ellipse 70% 55% at 50% 25%, color-mix(in oklch, var(--peach), white 5%) 0%, transparent 65%),\n      radial-gradient(ellipse 60% 50% at 30% 75%, color-mix(in oklch, var(--rose), white 10%) 0%, transparent 65%),\n      radial-gradient(ellipse 55% 45% at 75% 70%, color-mix(in oklch, var(--butter), white 12%) 0%, transparent 65%),\n      color-mix(in oklch, var(--paper), var(--peach) 20%);\n  }\n\n  /* ===== TEXT PANE ============================================== */\n  .text-pane {\n    padding: 70px 80px;\n    height: 100%;\n    box-sizing: border-box;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    position: relative;\n    z-index: 5;\n  }\n  .text-pane.center { align-items: center; text-align: center; }\n  .text-pane.top    { justify-content: flex-start; padding-top: 90px; }\n\n  .story-text {\n    font-family: \"Cormorant Garamond\", Georgia, serif;\n    font-size: 30px;\n    line-height: 1.45;\n    color: var(--ink);\n    font-weight: 500;\n    text-wrap: pretty;\n    max-width: 640px;\n    margin: 0;\n  }\n  .story-text + .story-text { margin-top: 16px; }\n  .story-text em { color: var(--accent); font-weight: 600; font-style: italic; }\n  .story-text .drop {\n    font-size: 76px;\n    line-height: 0.85;\n    float: left;\n    margin: 4px 12px -4px 0;\n    color: var(--accent);\n    font-family: \"Cormorant Garamond\", serif;\n    font-weight: 600;\n    font-style: italic;\n  }\n  .story-text.hand {\n    font-family: \"Caveat\", cursive;\n    font-size: 44px;\n    line-height: 1.05;\n    color: var(--accent);\n    max-width: 640px;\n  }\n  .story-text.whisper {\n    font-style: italic;\n    font-size: 24px;\n    color: var(--ink-soft);\n  }\n  .story-text.big { font-size: 38px; line-height: 1.25; }\n  .story-text.bigger { font-size: 44px; line-height: 1.2; }\n  .story-text.tiny { font-size: 22px; }\n\n  .ornament {\n    display: flex; align-items: center; gap: 12px; justify-content: center;\n    color: var(--accent);\n    margin: 18px 0;\n  }\n  .ornament::before, .ornament::after {\n    content: \"\"; height: 1px; width: 50px; background: currentColor; opacity: 0.45;\n  }\n  .ornament span { font-family: \"Caveat\", cursive; font-size: 22px; }\n  .ornament.left { justify-content: flex-start; }\n  .ornament.left::before { display: none; }\n\n  /* colour-word inline emphasis */\n  .c-red   { color: #c44e4e; font-style: italic; font-weight: 600; }\n  .c-grey  { color: #888; font-style: italic; font-weight: 600; }\n  .c-black { color: #2a2a2a; font-style: italic; font-weight: 600; }\n  .c-rainbow {\n    background: linear-gradient(90deg, #e0727b, #e8a370, #d8c060, #87b076, #7a9fbd, #9890c4, #b78fc0);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n    font-weight: 700; font-style: italic;\n  }\n\n  /* ===== FULL-BLEED SPREAD ====================================== */\n  .spread-full {\n    grid-column: 1 / -1;\n    position: relative;\n    overflow: hidden;\n    border-radius: 4px;\n  }\n  .text-overlay {\n    position: absolute;\n    background: var(--paper);\n    padding: 24px 36px;\n    border-radius: 4px;\n    box-shadow: 0 10px 24px rgba(40,30,15,0.22);\n    max-width: 560px;\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink);\n    font-weight: 500;\n    text-wrap: pretty;\n    z-index: 5;\n  }\n  .text-overlay.bl { bottom: 50px; left: 80px; }\n  .text-overlay.br { bottom: 50px; right: 80px; }\n  .text-overlay.tr { top: 50px;    right: 80px; }\n  .text-overlay.tl { top: 50px;    left: 80px; }\n  .text-overlay.center {\n    top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;\n  }\n\n  /* spread-spanning text band (top or bottom) */\n  .text-band {\n    position: absolute; left: 0; right: 0;\n    background: var(--paper);\n    padding: 22px 80px;\n    z-index: 6;\n    text-align: center;\n    box-shadow: 0 -6px 18px rgba(40,30,15,0.10);\n  }\n  .text-band.top { top: 0; box-shadow: 0 6px 18px rgba(40,30,15,0.10); }\n  .text-band.bottom { bottom: 0; }\n  .text-band p {\n    margin: 0;\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink);\n    font-weight: 500;\n    max-width: 1400px;\n    margin: 0 auto;\n  }\n  .text-band p + p { margin-top: 8px; }\n\n  /* ===== ENDPAPER PATTERN ======================================= */\n  .endpaper {\n    grid-column: 1 / -1;\n    position: relative;\n    border-radius: 4px;\n    overflow: hidden;\n    background: var(--paper);\n  }\n  .endpaper svg { position: absolute; inset: 0; width: 100%; height: 100%; }\n  .endpaper::before {\n    content: \"\";\n    position: absolute; left:50%; top:0; bottom:0; width: 30px; transform: translateX(-50%);\n    background: linear-gradient(90deg, transparent, rgba(40,20,5,0.16), transparent);\n    z-index: 2;\n  }\n\n  /* ===== COVER =================================================== */\n  .cover-spread {\n    grid-column: 1 / -1;\n    background:\n      radial-gradient(ellipse 65% 55% at 50% 30%, color-mix(in oklch, var(--rose), white 15%) 0%, transparent 65%),\n      radial-gradient(ellipse 60% 50% at 30% 80%, color-mix(in oklch, var(--sage), white 10%) 0%, transparent 65%),\n      radial-gradient(ellipse 55% 45% at 75% 70%, color-mix(in oklch, var(--sky), white 10%) 0%, transparent 65%),\n      radial-gradient(ellipse 40% 35% at 80% 20%, color-mix(in oklch, var(--butter), white 15%) 0%, transparent 65%),\n      var(--paper);\n    position: relative;\n    border-radius: 4px;\n    overflow: hidden;\n    color: var(--ink);\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    padding: 0;\n    align-items: stretch;\n    box-sizing: border-box;\n  }\n  .cover-spread::before {\n    content: \"\";\n    position: absolute; left:50%; top:0; bottom:0; width: 26px; transform: translateX(-50%);\n    background: linear-gradient(90deg, transparent, rgba(40,20,5,0.18), transparent);\n    z-index: 4;\n  }\n  .cover-art {\n    position: relative;\n    height: 100%;\n    border-radius: 0;\n    overflow: hidden;\n  }\n  .cover-art image-slot {\n    position: absolute; inset: 0; width: 100%; height: 100%;\n  }\n  .cover-meta {\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: flex-start;\n    text-align: left;\n    padding: 20px 10px;\n  }\n  .cover-title {\n    font-family: \"Caveat\", cursive;\n    font-size: 132px;\n    line-height: 0.9;\n    font-weight: 700;\n    color: var(--accent);\n    text-shadow: 0 2px 0 rgba(255,255,255,0.5);\n    margin: 0;\n  }\n  .cover-sub {\n    font-family: \"Cormorant Garamond\", serif;\n    font-style: italic;\n    font-size: 22px;\n    color: var(--ink-soft);\n    margin-top: 18px;\n    letter-spacing: 0.04em;\n    max-width: 420px;\n  }\n  .cover-credits {\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 16px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    margin-top: 60px;\n    line-height: 1.8;\n  }\n  .cover-credits b { color: var(--accent); font-weight: 600; letter-spacing: 0.18em; }\n\n  /* ===== HALF-TITLE / TITLE / DEDICATION ========================= */\n  .pane-center {\n    padding: 60px 70px;\n    height: 100%;\n    box-sizing: border-box;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n    position: relative;\n    z-index: 5;\n  }\n  .half-title {\n    font-family: \"Caveat\", cursive;\n    font-size: 86px;\n    color: var(--accent);\n    line-height: 1;\n    margin: 0;\n  }\n  .title-page h1 {\n    font-family: \"Caveat\", cursive;\n    font-size: 108px;\n    margin: 0 0 8px;\n    color: var(--accent);\n    line-height: 0.95;\n    font-weight: 700;\n  }\n  .title-page .credits {\n    font-family: \"Cormorant Garamond\", serif;\n    font-style: italic;\n    font-size: 22px;\n    color: var(--ink-soft);\n    margin-top: 28px;\n    line-height: 1.75;\n  }\n  .title-page .credits .name { color: var(--accent); font-style: normal; font-weight: 600; }\n  .title-page .pub {\n    margin-top: 40px;\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 13px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  .dedication {\n    font-family: \"Cormorant Garamond\", serif;\n    font-style: italic;\n    font-size: 24px;\n    color: var(--ink);\n    line-height: 1.6;\n    max-width: 460px;\n  }\n  .dedication .small {\n    font-family: \"Caveat\", cursive;\n    font-size: 22px;\n    font-style: normal;\n    display: block;\n    margin-top: 26px;\n    color: var(--accent);\n  }\n\n  /* ===== THE END / EPILOGUE ====================================== */\n  .the-end {\n    font-family: \"Caveat\", cursive;\n    font-size: 76px;\n    color: var(--accent);\n    text-align: center;\n    line-height: 1;\n    margin-top: 24px;\n  }\n  .moral {\n    font-family: \"Cormorant Garamond\", serif;\n    font-style: italic;\n    font-size: 24px;\n    line-height: 1.6;\n    color: var(--ink);\n    text-align: center;\n    max-width: 520px;\n    margin: 0 auto;\n  }\n\n  /* ===== IMPRINT ================================================= */\n  .imprint {\n    padding: 60px 70px;\n    height: 100%;\n    box-sizing: border-box;\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 14px;\n    line-height: 1.55;\n    color: var(--ink-soft);\n    position: relative;\n    z-index: 5;\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n    overflow-y: auto;\n  }\n  .imprint h3 {\n    margin: 0 0 6px;\n    font-family: \"Caveat\", cursive;\n    font-size: 26px;\n    color: var(--accent);\n    font-weight: 600;\n    font-style: normal;\n  }\n  .imprint p { margin: 0; }\n  .imprint .small { font-size: 11px; letter-spacing: 0.05em; opacity: 0.75; }\n  .imprint hr {\n    border: none; border-top: 1px solid rgba(60,40,20,0.15);\n    margin: 4px 0;\n  }\n\n  /* ===== BACK COVER ============================================== */\n  .back-cover {\n    grid-column: 1 / -1;\n    background:\n      radial-gradient(ellipse 60% 50% at 25% 25%, color-mix(in oklch, var(--rose), white 10%) 0%, transparent 60%),\n      radial-gradient(ellipse 55% 45% at 80% 75%, color-mix(in oklch, var(--sky), white 10%) 0%, transparent 60%),\n      radial-gradient(ellipse 50% 40% at 70% 25%, color-mix(in oklch, var(--butter), white 12%) 0%, transparent 60%),\n      var(--paper);\n    border-radius: 4px;\n    color: var(--ink);\n    padding: 60px 80px;\n    display: grid;\n    grid-template-columns: 1.3fr 1fr;\n    gap: 50px;\n    align-items: center;\n    position: relative;\n    box-sizing: border-box;\n  }\n  .back-cover::before { display: none; }\n  .blurb {\n    font-family: \"Cormorant Garamond\", serif;\n    font-size: 22px;\n    line-height: 1.55;\n    font-style: italic;\n    text-wrap: pretty;\n    color: var(--ink);\n    margin: 0;\n  }\n  .back-meta {\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n  }\n  .barcode {\n    background: rgba(255,250,240,0.9);\n    color: #2b1810;\n    padding: 12px 16px;\n    width: 220px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px;\n    border-radius: 2px;\n    border: 1px solid rgba(60,40,20,0.1);\n  }\n  .barcode .bars { display: flex; gap: 1px; height: 38px; align-items: stretch; margin-bottom: 6px; }\n  .barcode .bars i { background: #2b1810; }\n\n  /* ===== TWEAKS PANEL ============================================ */\n  #tweaks {\n    position: fixed;\n    bottom: 24px;\n    right: 24px;\n    width: 290px;\n    background: #1f1a14;\n    color: #f6edd9;\n    border-radius: 12px;\n    padding: 18px 18px 20px;\n    font-family: \"JetBrains Mono\", ui-monospace, monospace;\n    font-size: 12px;\n    z-index: 9999;\n    box-shadow: 0 20px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05) inset;\n    display: none;\n  }\n  #tweaks.visible { display: block; }\n  #tweaks h4 {\n    margin: 0 0 14px;\n    font-family: \"Caveat\", cursive;\n    font-size: 24px;\n    color: #f4c987;\n    font-weight: 600;\n    letter-spacing: 0.02em;\n    display: flex; justify-content: space-between; align-items: center;\n  }\n  #tweaks h4 .close {\n    cursor: pointer; font-family: \"JetBrains Mono\", monospace;\n    font-size: 14px; opacity: 0.6;\n    background: none; border: none; color: inherit;\n  }\n  #tweaks .section { margin-bottom: 16px; }\n  #tweaks .section-label {\n    text-transform: uppercase; font-size: 10px;\n    letter-spacing: 0.18em; opacity: 0.55; margin-bottom: 8px;\n  }\n  #tweaks .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }\n  #tweaks .swatch {\n    aspect-ratio: 1; border-radius: 6px; cursor: pointer;\n    border: 2px solid transparent; position: relative; overflow: hidden;\n    transition: transform 0.15s;\n  }\n  #tweaks .swatch:hover { transform: scale(1.05); }\n  #tweaks .swatch.active { border-color: #f4c987; }\n  #tweaks .toggles { display: grid; gap: 6px; }\n  #tweaks .toggle {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 8px 10px; background: rgba(255,255,255,0.04); border-radius: 6px;\n    cursor: pointer;\n  }\n  #tweaks .toggle:hover { background: rgba(255,255,255,0.07); }\n  #tweaks .toggle .pill {\n    width: 30px; height: 16px; border-radius: 10px;\n    background: rgba(255,255,255,0.15); position: relative;\n    transition: background 0.2s;\n  }\n  #tweaks .toggle .pill::after {\n    content: \"\"; position: absolute; top: 2px; left: 2px;\n    width: 12px; height: 12px; border-radius: 50%;\n    background: #f6edd9; transition: transform 0.2s;\n  }\n  #tweaks .toggle.on .pill { background: #c97f6f; }\n  #tweaks .toggle.on .pill::after { transform: translateX(14px); }\n  #tweaks .hint {\n    font-size: 10px; opacity: 0.55; line-height: 1.45;\n    margin-top: 4px;\n  }\n\n  /* ===== UTILITIES ============================================== */\n  .fade-strip {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px;\n    margin-top: 16px;\n  }\n  .fade-strip .step {\n    aspect-ratio: 1;\n    border-radius: 50%;\n    display: grid;\n    place-items: center;\n    font-family: \"Caveat\", cursive;\n    font-size: 22px;\n    color: rgba(255,255,255,0.9);\n    text-shadow: 0 1px 2px rgba(0,0,0,0.3);\n    box-shadow: 0 2px 6px rgba(0,0,0,0.15) inset;\n  }\n  .fade-strip .step.red   { background: radial-gradient(circle at 35% 30%, #ec7878, #b73e3e); }\n  .fade-strip .step.grey  { background: radial-gradient(circle at 35% 30%, #b8b8b8, #6e6e6e); }\n  .fade-strip .step.black { background: radial-gradient(circle at 35% 30%, #555, #161616); }\n  .fade-strip .step.gone  { background: transparent; border: 1px dashed rgba(60,40,20,0.3); color: rgba(60,40,20,0.45); font-style: italic; box-shadow: none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage>\n\n  <!-- ============================================================\n       PRELIMS – cover, endpapers, half-title, dedication+title\n       ============================================================ -->\n\n  <!-- 01 – FRONT COVER =========================================== -->\n  <section data-screen-label=\"01 Cover\">\n    <div class=\"book\">\n      <div class=\"cover-spread\">\n        <div class=\"cover-art\">\n          <image-slot id=\"cover-art\" src=\"images/lhb-01.webp\" placeholder=\"Cover illustration\" src=\"art/style-reference.webp\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"cover-meta\" style=\"padding: 60px 60px 60px 50px; display: flex; flex-direction: column; justify-content: center;\">\n          <h1 class=\"cover-title\">The Love<br>Heart<\u002Fh1>\n          <div class=\"cover-sub\">a story about love that wanders,<br>and finds its home<\u002Fdiv>\n          <div class=\"cover-credits\">\n            by <b>Ruby Flower<\u002Fb><br>\n            edited by Rachel Flower\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 – FRONT ENDPAPERS ======================================= -->\n  <section data-screen-label=\"02 Endpapers (front)\">\n    <div class=\"book\">\n      <div class=\"endpaper\">\n        <svg viewBox=\"0 0 1840 700\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n          <defs>\n            <symbol id=\"hp\" viewBox=\"0 0 100 90\">\n              <path d=\"M50 82 C 18 58, 6 38, 18 20 C 28 5, 44 8, 50 22 C 56 8, 72 5, 82 20 C 94 38, 82 58, 50 82 Z\"><\u002Fpath>\n            <\u002Fsymbol>\n          <\u002Fdefs>\n          <rect width=\"1840\" height=\"700\" fill=\"var(--paper)\"><\u002Frect>\n          <!-- soft rainbow swirl backdrop -->\n          <g opacity=\"0.18\">\n            <ellipse cx=\"300\" cy=\"180\" rx=\"280\" ry=\"120\" fill=\"#e6a6a8\"><\u002Fellipse>\n            <ellipse cx=\"600\" cy=\"120\" rx=\"260\" ry=\"110\" fill=\"#f4c89b\"><\u002Fellipse>\n            <ellipse cx=\"940\" cy=\"220\" rx=\"260\" ry=\"120\" fill=\"#f5e0a1\"><\u002Fellipse>\n            <ellipse cx=\"1240\" cy=\"160\" rx=\"260\" ry=\"110\" fill=\"#b8cdb0\"><\u002Fellipse>\n            <ellipse cx=\"1540\" cy=\"220\" rx=\"240\" ry=\"120\" fill=\"#b6d3e0\"><\u002Fellipse>\n            <ellipse cx=\"380\" cy=\"540\" rx=\"280\" ry=\"120\" fill=\"#c9b8d8\"><\u002Fellipse>\n            <ellipse cx=\"780\" cy=\"600\" rx=\"260\" ry=\"110\" fill=\"#e6a6a8\"><\u002Fellipse>\n            <ellipse cx=\"1180\" cy=\"540\" rx=\"260\" ry=\"120\" fill=\"#f4c89b\"><\u002Fellipse>\n            <ellipse cx=\"1500\" cy=\"600\" rx=\"240\" ry=\"110\" fill=\"#b8cdb0\"><\u002Fellipse>\n          <\u002Fg>\n          <!-- scatter of hearts in rainbow tones -->\n          <g>\n            <use href=\"#hp\" x=\"80\" y=\"50\" width=\"58\" height=\"52\" fill=\"#e0727b\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hp\" x=\"240\" y=\"120\" width=\"42\" height=\"38\" fill=\"#e8a370\" opacity=\"0.45\"><\u002 ef=\"#hp\" x=\"1100\" y=\"310\" width=\"58\" height=\"52\" fill=\"#7a9fbd\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1260\" y=\"370\" width=\"40\" height=\"36\" fill=\"#9890c4\" opacity=\"0.45\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1420\" y=\"300\" width=\"56\" height=\"50\" fill=\"#b78fc0\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1580\" y=\"360\" width=\"44\" height=\"40\" fill=\"#e0727b\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1720\" y=\"300\" width=\"48\" height=\"44\" fill=\"#e8a370\" opacity=\"0.5\"><\u002Fuse>\n\n            <use href=\"#hp\" x=\"80\" y=\"510\" width=\"60\" height=\"54\" fill=\"#d8c060\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"240\" y=\"580\" width=\"42\" height=\"38\" fill=\"#87b076\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"380\" y=\"520\" width=\"56\" height=\"50\" fill=\"#7a9fbd\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hp\" x=\"540\" y=\"600\" width=\"38\" height=\"34\" fill=\"#9890c4\" opacity=\"0.45\"><\u002Fuse>\n            <use href=\"#hp\" x=\"680\" y=\"540\" width=\"58\" height=\"52\" fill=\"#b78fc0\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hp\" x=\"850\" y=\"590\" width=\"44\" height=\"40\" fill=\"#e0727b\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1000\" y=\"520\" width=\"56\" height=\"50\" fill=\"#e8a370\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1160\" y=\"600\" width=\"40\" height=\"36\" fill=\"#d8c060\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1320\" y=\"540\" width=\"60\" height=\"54\" fill=\"#87b076\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1480\" y=\"600\" width=\"42\" height=\"38\" fill=\"#7a9fbd\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1620\" y=\"520\" width=\"58\" height=\"52\" fill=\"#9890c4\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hp\" x=\"1770\" y=\"600\" width=\"36\" height=\"32\" fill=\"#b78fc0\" opacity=\"0.55\"><\u002Fuse>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 – HALF-TITLE ============================================ -->\n  <section data-screen-label=\"03 Half-title\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <!-- back of endpaper: very subtle pattern -->\n        <svg viewBox=\"0 0 920 700\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\" style=\"position:absolute; inset:0; width:100%; height:100%; opacity:0.35;\">\n          <defs>\n            <symbol id=\"hps\" viewBox=\"0 0 100 90\">\n              <path d=\"M50 82 C 18 58, 6 38, 18 20 C 28 5, 44 8, 50 22 C 56 8, 72 5, 82 20 C 94 38, 82 58, 50 82 Z\"><\u002Fpath>\n            <\u002Fsymbol>\n          <\u002Fdefs>\n          <use href=\"#hps\" x=\"180\" y=\"120\" width=\"36\" height=\"32\" fill=\"#e0727b\" opacity=\"0.55\"><\u002Fuse>\n          <use href=\"#hps\" x=\"420\" y=\"80\" width=\"44\" height=\"40\" fill=\"#e8a370\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"660\" y=\"160\" width=\"36\" height=\"32\" fill=\"#d8c060\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"240\" y=\"360\" width=\"40\" height=\"36\" fill=\"#87b076\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"500\" y=\"320\" width=\"36\" height=\"32\" fill=\"#7a9fbd\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"700\" y=\"400\" width=\"44\" height=\"40\" fill=\"#9890c4\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"160\" y=\"560\" width=\"40\" height=\"36\" fill=\"#b78fc0\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"440\" y=\"560\" width=\"44\" height=\"40\" fill=\"#e0727b\" opacity=\"0.5\"><\u002Fuse>\n          <use href=\"#hps\" x=\"680\" y=\"580\" width=\"36\" height=\"32\" fill=\"#e8a370\" opacity=\"0.5\"><\u002Fuse>\n        <\u002Fsvg>\n        <div class=\"folio\">i<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"pane-center\">\n          <h1 class=\"half-title\">The Love Heart<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"folio\">iii<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 – DEDICATION + TITLE PAGE ================================ -->\n  <section data-screen-label=\"04 Dedication &amp; Title\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"pane-center\">\n          <p class=\"dedication\">\n            For <em style=\"color: var(--accent); font-style: normal; font-weight: 600;\">Ruby<\u002Fem>, who was nine.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">iv<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"title-page pane-center\">\n          <h1>The Love<br>Heart<\u002Fh1>\n          <p class=\"credits\">\n            written by <span class=\"name\">Ruby Flower<\u002Fspan><br>\n            edited by <span class=\"name\">Rachel Flower<\u002Fspan>\n          <\u002Fp>\n          <div class=\"pub\">Mockup Press · First Edition<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"folio\">v<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       THE 14 STORY SPREADS\n       ============================================================ -->\n\n  <!-- 05 – SPREAD 1 :: The boy with a special heart ============== -->\n  <section data-screen-label=\"05 Spread 1 – The boy with a special heart\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-warm\">\n          <image-slot id=\"s01\" src=\"images/lhb-02.webp\" placeholder=\"Small boy, Welsh hills behind – sheep on the slope, sky soft. A glowing rainbow loveheart visible inside his chest. Family figures in soft outline – mother kneeling, father near, friends close. Warm and safe.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">6<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\">\n            <span class=\"drop\">O<\u002Fspan>nce upon a time there was a boy with a heart.\n          <\u002Fp>\n          <p class=\"story-text hand\" style=\"margin-top: 10px;\">\n            A <em style=\"color:inherit;\">very special<\u002Fem> heart.\n          <\u002Fp>\n          <p class=\"story-text\" style=\"margin-top: 18px;\">\n            He had a loveheart in his chest that <em>represented<\u002Fem> his love for his family and friends, and their love for him.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">7<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 – SPREAD 2 :: The cold turn ============================= -->\n  <section data-screen-label=\"06 Spread 2 – The cold turn\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-cold\">\n          <image-slot id=\"s02a\" src=\"images/lhb-03.webp\" placeholder=\"Older boy. Palette cooled to greys &amp; dusty blues. The heart inside his chest visibly smaller and dimmer. He doesn't notice.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">8<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"illus-frame bloom-cold\">\n          <image-slot id=\"s02b\" src=\"images/lhb-04.webp\" placeholder=\"Moment of separation – the loveheart being expelled from the boy's body. He still doesn't notice.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"text-overlay tr\" style=\"position: absolute; max-width: 380px; font-size: 22px;\">\n          As the boy grew older –<br>\n          <span style=\"display:block; margin-top: 4px;\">his love shrunk.<br>And the heart grew <em style=\"color: var(--accent);\">cold<\u002Fem>.<\u002Fspan>\n          <span style=\"display:block; margin-top: 14px; font-family:'Caveat',cursive; color: var(--accent); font-size: 32px; line-height: 1;\">And one day the loveheart got kicked out of the boy's body.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"folio\">9<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 – SPREAD 3 :: Homeless on the streets =================== -->\n  <section data-screen-label=\"07 Spread 3 – Homeless on the streets\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-grey\">\n        <image-slot id=\"s03\" src=\"images/lhb-05.webp\" placeholder=\"A vast cold-toned Welsh street in the rain. Stone walls, grey skies. The tiny loveheart somewhere in the spread – reader has to hunt for her. Scale: she's almost lost.\"><\u002Fimage-slot>\n        <div class=\"text-overlay bl\" style=\"max-width: 420px;\">\n          Homeless, the loveheart was forced to live on the streets.\n          <span style=\"display:block; margin-top: 10px; font-style: italic; color: var(--ink-soft); font-size: 22px;\">The loveheart was cold on the street.<\u002Fspan>\n          <span style=\"display:block; margin-top: 8px; font-family:'Caveat',cursive; color: var(--accent); font-size: 36px; line-height: 1;\">It was lonely.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 – SPREAD 4 :: The fade sequence (THE RULE) ============== -->\n  <section data-screen-label=\"08 Spread 4 – The fade rule\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-grey\">\n        <image-slot id=\"s04\" src=\"images/lhb-06.webp\" placeholder=\"The teaching spread. Four heart states across the spread (left to right): RED – GREY – BLACK – DISPERSING INTO PAPER SCRAPS. Paper-scraps blowing across both pages. The visual rule the rest of the book runs on.\"><\u002Fimage-slot>\n        <div class=\"text-band top\">\n          <p>Since the loveheart was a <em>feeling<\u002Fem>, she only existed if people loved.<\u002Fp>\n          <p style=\"font-style: italic; color: var(--ink-soft);\">If everyone stopped loving, the loveheart would simply disappear.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"text-band bottom\" style=\"text-align: left; padding: 18px 60px;\">\n          <div style=\"display: grid; grid-template-columns: 1.4fr auto auto auto auto; gap: 18px; align-items: center; max-width: 1500px; margin: 0 auto;\">\n            <div style=\"font-family:'Cormorant Garamond',serif; font-style: italic; font-size: 28px; color: var(--ink);\">\n              She would slowly turn from –\n            <\u002Fdiv>\n            <div class=\"step\" style=\"width: 56px; height: 56px; background: radial-gradient(circle at 35% 30%, #ec7878, #b73e3e); border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px;\">red<\u002Fdiv>\n            <div class=\"step\" style=\"width: 56px; height: 56px; background: radial-gradient(circle at 35% 30%, #b8b8b8, #6e6e6e); border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px;\">grey<\u002Fdiv>\n            <div class=\"step\" style=\"width: 56px; height: 56px; background: radial-gradient(circle at 35% 30%, #555, #161616); border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px;\">black<\u002Fdiv>\n            <div style=\"font-family:'Caveat',cursive; color: var(--accent); font-size: 34px; line-height: 1.1; max-width: 320px;\">\n              and disappear, like tiny snippets of paper escaping in the wind.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 – SPREAD 5 :: Invisible, kicked (Past shoes / wheels / feet) -->\n  <section data-screen-label=\"09 Spread 5 – Invisible, kicked\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\">\n            The loveheart wandered the streets, looking for a new home in someone's body.\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 14px;\">\n            But the world had no mercy.<br>And no love.\n          <\u002Fp>\n          <p class=\"story-text\" style=\"margin-top: 22px;\">\n            Since she was invisible, she just kept getting kicked about the street –\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 6px;\">\n            without people noticing.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">14<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div style=\"position: absolute; inset: 36px; display: grid; grid-template-rows: 1fr 1fr 1fr; gap: 10px;\">\n          <div class=\"illus-frame bloom-grey\" style=\"position: relative; inset: 0; border-radius: 4px;\">\n            <image-slot id=\"s05a\" src=\"images/lhb-07.webp\" placeholder=\"Worm's-eye on a Welsh village pavement – giant SHOES towering past the loveheart\"><\u002Fimage-slot>\n            <div style=\"position: absolute; bottom: 12px; right: 16px; font-family:'Caveat',cursive; color: var(--accent); font-size: 36px; line-height: 1; text-shadow: 0 1px 0 rgba(255,255,255,0.5); z-index: 5;\">Past shoes.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"illus-frame bloom-grey\" style=\"position: relative; inset: 0; border-radius: 4px;\">\n            <image-slot id=\"s05b\" src=\"images/lhb-08.webp\" placeholder=\"Worm's-eye on the same Welsh pavement – bike WHEELS, pram wheels rolling past\"><\u002Fimage-slot>\n            <div style=\"position: absolute; bottom: 12px; right: 16px; font-family:'Caveat',cursive; color: var(--accent); font-size: 36px; line-height: 1; text-shadow: 0 1px 0 rgba(255,255,255,0.5); z-index: 5;\">Past wheels.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"illus-frame bloom-grey\" style=\"position: relative; inset: 0; border-radius: 4px;\">\n            <image-slot id=\"s05c\" src=\"images/lhb-09.webp\" placeholder=\"Worm's-eye on the same pavement – hurried FEET stepping past, almost trampling her\"><\u002Fimage-slot>\n            <div style=\"position: absolute; bottom: 12px; right: 16px; font-family:'Caveat',cursive; color: var(--accent); font-size: 36px; line-height: 1; text-shadow: 0 1px 0 rgba(255,255,255,0.5); z-index: 5;\">Past hurried feet.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"folio\">15<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 – SPREAD 6 :: Walked for days (PAUSE SPREAD) ============ -->\n  <section data-screen-label=\"10 Spread 6 – Walked for days (pause)\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-cold\">\n        <image-slot id=\"s06\" src=\"images/lhb-10.webp\" placeholder=\"THE PAUSE SPREAD. A single quiet wide Welsh landscape – empty road, low stone walls, fields, sheep on a distant slope, a far farmhouse. The loveheart tiny, a single speck on the horizon. Resist the temptation to fill it.\"><\u002Fimage-slot>\n        <div class=\"text-overlay center\" style=\"max-width: 600px; padding: 26px 40px; font-size: 28px;\">\n          <span style=\"font-family:'Caveat',cursive; color: var(--accent); font-size: 48px; line-height: 1.0; display: block;\">\n            The loveheart walked\n          <\u002Fspan>\n          <span style=\"font-family:'Caveat',cursive; color: var(--accent); font-size: 48px; line-height: 1.0; display: block; margin-top: 4px;\">\n            for days and days.\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 – SPREAD 7 :: She saw in colours ======================== -->\n  <section data-screen-label=\"11 Spread 7 – She saw in colours\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-cold\">\n          <image-slot id=\"s07\" src=\"images/lhb-11.webp\" placeholder=\"Pavement-level on a Welsh market town high street. Crowds walking past stone shopfronts. Most figures grey. One or two glowing soft red. The reader needs to be able to scan and pick out the reds by the end of the spread – TEACH the colour rule.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">18<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\">\n            The loveheart saw in <em>colours<\u002Fem>.\n          <\u002Fp>\n          <p class=\"story-text\" style=\"margin-top: 14px;\">\n            <span class=\"c-grey\">Grey<\u002Fspan> for people with no love inside them.\n          <\u002Fp>\n          <p class=\"story-text\" style=\"margin-top: 6px;\">\n            <span class=\"c-red\">Red<\u002Fspan> for people full of love.\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 18px;\">\n            If she was able to find someone full of bright <span class=\"c-red\">red<\u002Fspan> colour, then she could be sucked inside their body, and help them to stay loving forever.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">19<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 – SPREAD 8 :: Rainbow people (vision spread) ============ -->\n  <section data-screen-label=\"12 Spread 8 – Rainbow people\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-rainbow\">\n        <image-slot id=\"s08\" src=\"images/lhb-12.webp\" placeholder=\"A VISION spread. The loveheart imagining what a rainbow person looks like. A single luminous rainbow figure mid-spread – almost mythic, slightly out of reach. Memory-coloured, soft-edged. Not yet found.\"><\u002Fimage-slot>\n        <div class=\"text-overlay tl\" style=\"max-width: 520px; padding: 24px 36px;\">\n          The colour she searched for most was –\n          <span style=\"display:block; margin-top: 6px; font-family:'Caveat',cursive; font-size: 76px; line-height: 1;\"><span class=\"c-rainbow\">rainbow.<\u002Fspan><\u002Fspan>\n          <span style=\"display:block; margin-top: 14px; font-size: 22px; font-style: italic; color: var(--ink-soft);\">\n            People with rainbow colours meant that they had been loved deeply and with the best type of love, and they became the <em style=\"color: var(--accent);\">best<\u002Fem> and <em style=\"color: var(--accent);\">strongest<\u002Fem> people.\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 – SPREAD 9 :: No rainbows, only greys =================== -->\n  <section data-screen-label=\"13 Spread 9 – No rainbows, only greys\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\">\n            But the little loveheart found\n          <\u002Fp>\n          <p class=\"story-text bigger\" style=\"margin-top: 10px;\">\n            no rainbows.\n          <\u002Fp>\n          <p class=\"story-text bigger\" style=\"margin-top: 4px; color: var(--ink-soft);\">\n            Or reds.\n          <\u002Fp>\n          <p class=\"story-text bigger\" style=\"margin-top: 4px;\">\n            Just <span class=\"c-grey\">greys<\u002Fspan>.\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 24px;\">\n            And she wandered and she searched and got colder and wearier.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">22<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"illus-frame bloom-grey\">\n          <image-slot id=\"s09\" src=\"images/lhb-13.webp\" placeholder=\"A wide square – the loveheart inside a SEA of identical-looking grey figures. Her own colour beginning to dim. Where her own fade starts to threaten.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">23<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 – SPREAD 10 :: A million people / needle in a haystack === -->\n  <section data-screen-label=\"14 Spread 10 – A million people\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-dark\">\n          <image-slot id=\"s10\" src=\"images/lhb-14.webp\" placeholder=\"THE LOWEST POINT. Overhead view of a VAST grey crowd in a Welsh city square (Cardiff?) – try to visualise the million. The loveheart darker now, closer to grey herself. Don't soften.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">24<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\">\n            Day by day, the loveheart became <em>sadder<\u002Fem> – and <em>angrier<\u002Fem> at the world.\n          <\u002Fp>\n          <p class=\"story-text\" style=\"margin-top: 14px;\">\n            She despaired at how few people loved.\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 14px;\">\n            She must have met a million people passing her in the streets.\n          <\u002Fp>\n          <p class=\"story-text hand\" style=\"margin-top: 14px; font-size: 40px;\">\n            For her it was like finding a needle in a haystack.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">25<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 – SPREAD 11 :: The kick into the shop (KINETIC) ========= -->\n  <section data-screen-label=\"15 Spread 11 – The kick into the shop\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-dawn\">\n        <image-slot id=\"s11\" src=\"images/lhb-15.webp\" placeholder=\"THE ACTION SPREAD. A Welsh high street – old shop with a bowed glass window, painted sign. The huge BOOT mid-stride, the heart mid-flight, the shop doorway. Diagonal composition, kinetic. The first sudden motion after pages of slow despair. LOUDER, FASTER, BRIGHTER than every other spread.\"><\u002Fimage-slot>\n        <div class=\"text-overlay tl\" style=\"max-width: 480px; transform: rotate(-2deg); transform-origin: top left;\">\n          Just when she was about to give up completely –\n          <span style=\"display:block; margin-top: 8px; font-family:'Caveat',cursive; color: var(--accent); font-size: 44px; line-height: 1.0;\">she got kicked by a huge<br>booted foot,<\u002Fspan>\n          <span style=\"display:block; margin-top: 4px; font-style: italic;\">straight into a shop.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 – SPREAD 12 :: The rainbow boy (HERO SHOT) ============== -->\n  <section data-screen-label=\"16 Spread 12 – The rainbow boy (hero)\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"text-pane\">\n          <p class=\"story-text\" style=\"font-size: 26px;\">\n            And there she saw it.\n          <\u002Fp>\n          <p class=\"story-text hand\" style=\"margin-top: 14px; font-size: 56px; line-height: 1.05; max-width: 100%;\">\n            <span style=\"font-family:'Cormorant Garamond',serif; font-style: italic; font-weight: 500; font-size: 28px; color: var(--ink); display:block; line-height:1; margin-bottom: 6px;\">A<\u002Fspan>\n            <span class=\"c-rainbow\">beautiful<\u002Fspan><br><span class=\"c-rainbow\">rainbow boy.<\u002Fspan>\n          <\u002Fp>\n          <div class=\"ornament left\" style=\"margin: 26px 0;\"><span style=\"margin:0;\">♡<\u002Fspan><\u002Fdiv>\n          <p class=\"story-text whisper\">\n            The loveheart was <em style=\"color: var(--accent);\">amazed<\u002Fem>.<br>\n            She stared at this phenomenon.\n          <\u002Fp>\n          <p class=\"story-text whisper\" style=\"margin-top: 10px;\">\n            She had realised it was very rare –<br>\n            <em style=\"font-style: italic;\">extremely rare indeed<\u002Fem> – to find a rainbow person.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">28<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"illus-frame bloom-rainbow\">\n          <image-slot id=\"s12\" src=\"images/lhb-16.webp\" placeholder=\"THE PIVOT OF THE BOOK. THE HERO SHOT. Inside that same Welsh shop – warm wooden interior, shelves of jars or sweets. Rainbow boy revealed, colours glowing. The loveheart small at his feet, looking up. The shot that sells the book on a publisher's desk.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"folio\">29<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17 – SPREAD 13 :: The boy fading (mirrors Spread 4) ======== -->\n  <section data-screen-label=\"17 Spread 13 – The boy fading (mirrors spread 4)\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-grey\">\n        <image-slot id=\"s13\" src=\"images/lhb-17.webp\" placeholder=\"THE FADE SEQUENCE APPLIED TO THE BOY. Three frames across the spread: LEFT = rainbow boy, MIDDLE = red boy, RIGHT = grey boy. Mirror the layout of Spread 4 deliberately – the reader should feel the rule the book taught them now happening in real time. The loveheart helpless in the corner.\"><\u002Fimage-slot>\n        <div class=\"text-band top\">\n          <p>The boy was lost. He was looking for his parents.<\u002Fp>\n          <p style=\"font-style: italic; color: var(--ink-soft);\">Did I tell you – if a rainbow person feels unloved, their colour will fade?<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"text-band bottom\" style=\"text-align: left; padding: 18px 60px;\">\n          <div style=\"display: grid; grid-template-columns: 1fr auto auto auto 1fr; gap: 14px; align-items: center; max-width: 1500px; margin: 0 auto;\">\n            <div style=\"font-family:'Cormorant Garamond',serif; font-size: 28px; color: var(--ink); text-align: right; font-style: italic;\">\n              He started turning –\n            <\u002Fdiv>\n            <div style=\"width: 56px; height: 56px; border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); background: conic-gradient(from 0deg, #e0727b, #e8a370, #d8c060, #87b076, #7a9fbd, #9890c4, #b78fc0, #e0727b);\">rainbow<\u002Fdiv>\n            <div style=\"width: 56px; height: 56px; border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px; background: radial-gradient(circle at 35% 30%, #ec7878, #b73e3e);\">red<\u002Fdiv>\n            <div style=\"width: 56px; height: 56px; border-radius: 50%; display:grid; place-items:center; font-family:'Caveat',cursive; color: white; font-size: 20px; background: radial-gradient(circle at 35% 30%, #b8b8b8, #6e6e6e);\">grey<\u002Fdiv>\n            <div style=\"font-family:'Caveat',cursive; color: var(--accent); font-size: 34px; line-height: 1.05; text-align: left;\">\n              The loveheart was<br>too late.<br><em style=\"font-style: italic;\">Or was she?<\u002Fem>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18 – SPREAD 14 :: Mum! Dad! ================================ -->\n  <section data-screen-label=\"18 Spread 14 – Mum! Dad!\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-dawn\">\n          <image-slot id=\"s14a\" src=\"images/lhb-18.webp\" placeholder=\"LEFT BEAT: the bowed-window door of the same Welsh shop swings open. Parents bursting through – flushed, breathless. Wind disturbing their coats.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"text-overlay br\" style=\"position: absolute; max-width: 400px; bottom: 60px; right: 60px;\">\n          The boy's parents were looking for him.<br>\n          <span style=\"display:block; margin-top: 6px; font-style: italic; color: var(--ink-soft); font-size: 22px;\">Flushed and worried, they appeared in the shop.<\u002Fspan>\n          <span style=\"display:block; margin-top: 10px; font-family:'Caveat',cursive; color: var(--accent); font-size: 50px; line-height: 1;\">“Mum! Dad!”<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"folio\">32<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"illus-frame bloom-warm\">\n          <image-slot id=\"s14b\" src=\"images/lhb-19.webp\" placeholder=\"RIGHT BEAT: the EMBRACE, inside the same Welsh shop. Boy in his parents' arms – colour FLOODING back through him in rainbow bands. The loveheart drawn toward his chest, almost airborne, streaking in. Warm tones overtaking the greys of spreads 9–10.\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div class=\"text-overlay bl\" style=\"position: absolute; max-width: 380px; bottom: 60px; left: 60px;\">\n          His face <em style=\"color: var(--accent);\">lit up<\u002Fem>.<br>\n          <span style=\"display:block; margin-top: 6px; font-style: italic; color: var(--ink-soft); font-size: 22px;\">Slowly, but surely, he turned <span class=\"c-rainbow\">rainbow<\u002Fspan> again.<\u002Fspan>\n          <span style=\"display:block; margin-top: 10px; font-family:'Caveat',cursive; color: var(--accent); font-size: 30px; line-height: 1.05;\">And the loveheart got sucked into the boy's body.<\u002Fspan>\n          <span style=\"display:block; margin-top: 4px; font-size: 17px; font-style: italic; color: var(--accent);\">She was so happy to have found a safe place to live again, and do her magic.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"folio\">33<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       EPILOGUE SPREAD + CLOSING\n       ============================================================ -->\n\n  <!-- 19 – SPREAD 15 :: The generations (epilogue) ============== -->\n  <section data-screen-label=\"19 Spread 15 – The generations (epilogue)\">\n    <div class=\"book\">\n      <div class=\"spread-full illus-frame fullbleed bloom-rainbow\">\n        <image-slot id=\"s15\" src=\"images/lhb-20.webp\" placeholder=\"A LINEAGE spread. A glowing rainbow tree with the boy at the root, children, grandchildren, great-grandchildren branching upward – all rainbow. Or a long horizontal procession across the spread, generations walking together. Or a circle. Something that holds time without being literal.\"><\u002Fimage-slot>\n        <div class=\"text-overlay center\" style=\"max-width: 720px; padding: 26px 36px;\">\n          <span style=\"display:block; font-style: italic; font-size: 26px; color: var(--ink-soft);\">\n            Over the years, the boy didn't stop being <span class=\"c-rainbow\">rainbow<\u002Fspan>.\n          <\u002Fspan>\n          <span style=\"display:block; margin-top: 8px; font-size: 26px;\">\n            His friends loved him. And his family always loved him.\n          <\u002Fspan>\n          <span style=\"display:block; margin-top: 12px; font-family:'Cormorant Garamond',serif; font-size: 24px; color: var(--ink); font-style: italic;\">\n            Even when he died – his life had been <em style=\"color: var(--accent);\">brilliant<\u002Fem> – which meant his children were rainbow, and so were their children, and their children, and their children, and so on.\n          <\u002Fspan>\n          <span style=\"display:block; margin-top: 14px; font-family:'Caveat',cursive; color: var(--accent); font-size: 36px; line-height: 1.05;\">\n            And the loveheart lived<br>till the end of the world –\n          <\u002Fspan>\n          <span style=\"display:block; margin-top: 4px; font-size: 22px; font-style: italic; color: var(--ink-soft);\">\n            because there were always loved people, and loving people.\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 20 – CLOSING PAGE (left blank/colophon, right Ruby's voice) -->\n  <section data-screen-label=\"20 The End – closing address\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"pane-center\" style=\"padding: 80px 60px;\">\n          <div class=\"the-end\">The End.<\u002Fdiv>\n          <div class=\"ornament\" style=\"margin-top: 32px;\"><span>♡<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"folio\">36<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"text-pane center\" style=\"justify-content: center;\">\n          <p class=\"moral\" style=\"font-size: 28px;\">\n            Love is a funny thing<br>but so is the world.\n          <\u002Fp>\n          <div class=\"ornament\" style=\"margin: 26px 0;\"><span>♡<\u002Fspan><\u002Fdiv>\n          <p class=\"moral\" style=\"font-size: 28px;\">\n            Never give up<br>\n            even when it seems like you should.\n          <\u002Fp>\n          <div class=\"ornament\" style=\"margin: 26px 0;\"><span>♡<\u002Fspan><\u002Fdiv>\n          <p class=\"moral\" style=\"font-size: 28px;\">\n            Keep loving and you'll find someone\n          <\u002Fp>\n          <p class=\"moral\" style=\"margin-top: 6px; font-family: 'Caveat', cursive; font-style: normal; font-size: 40px; color: var(--accent); line-height: 1.05;\">\n            to help and love.\n          <\u002Fp>\n          <div style=\"margin-top: 40px; text-align: center;\"><span style=\"font-family:'Caveat',cursive; font-size: 44px; color: var(--accent); font-style: italic; font-weight: 600; display: inline-block; transform: rotate(-4deg);\">Ruby ♡<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"folio\">37<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 21 – IMPRINT / ABOUT ===================================== -->\n  <section data-screen-label=\"21 Imprint &amp; About\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"imprint\">\n          <h3>The Love Heart<\u002Fh3>\n          <p>\n            Text © <em>Ruby Flower<\u002Fem>, 2026.<br>\n            Edited by Rachel Flower.\n          <\u002Fp>\n          <hr>\n          <p class=\"small\">\n            All rights reserved. No part of this book may be reproduced, stored, or transmitted without the prior permission of the publisher.\n          <\u002Fp>\n          <p class=\"small\">\n            First published 2026 by Mockup Press.<br>\n            Printed in the United Kingdom.\n          <\u002Fp>\n          <hr>\n          <p class=\"small\">\n            Set in <em>Cormorant Garamond<\u002Fem> &amp; <em>Caveat<\u002Fem>.<br>\n            Paper: 150gsm uncoated cream.<br>\n            Trim size: 280 × 216 mm landscape.<br>\n            ISBN 978–0–MOCKUP–0000–0\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">38<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"imprint\">\n          <h3>About the Author<\u002Fh3>\n          <p>\n            <em style=\"color: var(--accent); font-style: normal; font-weight: 600;\">Ruby Flower<\u002Fem> wrote <em>The Love Heart<\u002Fem> when she was nine years old. This is her first book.\n          <\u002Fp>\n          <hr>\n          <h3>About the Editor<\u002Fh3>\n          <p>\n            <em style=\"color: var(--accent); font-style: normal; font-weight: 600;\">Rachel Flower<\u002Fem> is Ruby's mother. She helped shape the text while preserving Ruby's voice.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"folio\">39<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 22 – BACK ENDPAPERS ====================================== -->\n  <section data-screen-label=\"22 Endpapers (back)\">\n    <div class=\"book\">\n      <div class=\"endpaper\">\n        <svg viewBox=\"0 0 1840 700\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n          <defs>\n            <symbol id=\"hpb\" viewBox=\"0 0 100 90\">\n              <path d=\"M50 82 C 18 58, 6 38, 18 20 C 28 5, 44 8, 50 22 C 56 8, 72 5, 82 20 C 94 38, 82 58, 50 82 Z\"><\u002Fpath>\n            <\u002Fsymbol>\n          <\u002Fdefs>\n          <rect width=\"1840\" height=\"700\" fill=\"var(--paper)\"><\u002Frect>\n          <g opacity=\"0.18\">\n            <ellipse cx=\"380\" cy=\"200\" rx=\"280\" ry=\"120\" fill=\"#c9b8d8\"><\u002Fellipse>\n            <ellipse cx=\"680\" cy=\"120\" rx=\"260\" ry=\"110\" fill=\"#b6d3e0\"><\u002Fellipse>\n            <ellipse cx=\"980\" cy=\"200\" rx=\"260\" ry=\"120\" fill=\"#b8cdb0\"><\u002Fellipse>\n            <ellipse cx=\"1280\" cy=\"120\" rx=\"260\" ry=\"110\" fill=\"#f5e0a1\"><\u002Fellipse>\n            <ellipse cx=\"1580\" cy=\"200\" rx=\"240\" ry=\"120\" fill=\"#f4c89b\"><\u002Fellipse>\n            <ellipse cx=\"300\" cy=\"540\" rx=\"280\" ry=\"120\" fill=\"#e6a6a8\"><\u002Fellipse>\n            <ellipse cx=\"700\" cy=\"600\" rx=\"260\" ry=\"110\" fill=\"#c9b8d8\"><\u002Fellipse>\n            <ellipse cx=\"1100\" cy=\"540\" rx=\"260\" ry=\"120\" fill=\"#b6d3e0\"><\u002Fellipse>\n            <ellipse cx=\"1440\" cy=\"600\" rx=\"240\" ry=\"110\" fill=\"#b8cdb0\"><\u002Fellipse>\n          <\u002Fg>\n          <g>\n            <use href=\"#hpb\" x=\"100\" y=\"60\" width=\"50\" height=\"44\" fill=\"#b78fc0\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hpb\" x=\"260\" y=\"130\" width=\"42\" height=\"38\" fill=\"#9890c4\" opacity=\"0.5\"><\u002Fuse>\n            <use href=\"#hpb\" x=\"400\" y=\"50\" width=\"60\" height=\"54\" fill=\"#7a9fbd\" opacity=\"0.55\"><\u002Fuse>\n            <use href=\"#hpb\" x=\"560\" y=\"140\" width=\"40\" height=\"36\" fill=\"#87b076\" opacity=\"0.5\"><\u002Fuse>\n ============================= -->\n  <section data-screen-label=\"23 Back cover\">\n    <div class=\"book\">\n      <div class=\"page left\">\n        <div class=\"illus-frame bloom-warm\" style=\"position: absolute; inset: 0; border-radius: 0;\">\n          <image-slot id=\"back-cover-art\" src=\"images/lhb-21.webp\" placeholder=\"Back cover illustration\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page right\">\n        <div class=\"back-cover\" style=\"grid-column: auto; height: 100%; padding: 70px 70px; display: flex; flex-direction: column; justify-content: space-between; gap: 30px;\">\n          <div>\n            <div style=\"font-family: 'Caveat', cursive; font-size: 56px; line-height: 1; margin-bottom: 20px; color: var(--accent);\">The Love Heart<\u002Fdiv>\n            <p class=\"blurb\">\n              When the loveheart of a boy goes cold, it gets kicked out into the world – invisible, lonely, searching for somewhere new to live.\n            <\u002Fp>\n            <p class=\"blurb\" style=\"margin-top: 14px;\">\n              What she sees in the city would make anyone give up. But just when she's about to –\n            <\u002Fp>\n            <p class=\"blurb\" style=\"margin-top: 14px; font-family:'Caveat',cursive; font-style: normal; font-size: 34px; line-height: 1.1; color: var(--accent);\">\n              she finds a beautiful<br>rainbow boy.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"back-meta\" style=\"gap: 14px;\">\n            <div style=\"font-family:'Cormorant Garamond',serif; font-style: italic; font-size: 18px; color: var(--ink-soft); line-height: 1.5;\">\n              A small story about love that wanders, fades, returns, and lives on – written by Ruby when she was nine.\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-end; justify-content: space-between; gap: 16px;\">\n              <div class=\"barcode\">\n                <div class=\"bars\">  the paper, washes &amp; accent colours.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"section-label\">Pages<\u002Fdiv>\n    <div class=\"toggles\">\n      <div class=\"toggle on\" data-tweak=\"grain\">\n        <span>Paper grain<\u002Fspan><span class=\"pill\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"toggle on\" data-tweak=\"notes\">\n        <span>Illustration notes<\u002Fspan><span class=\"pill\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"toggle on\" data-tweak=\"folios\">\n        <span>Page numbers<\u002Fspan><span class=\"pill\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"toggle\" data-tweak=\"binding\">\n        <span>Heavy book binding shadow<\u002Fspan><span class=\"pill\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"section-label\">Illustrations<\u002Fdiv>\n    <div class=\"hint\" style=\"margin-top:2px;\">\n      Drag any image onto a placeholder to drop in a watercolour.<br>\n      Double-click a filled slot to reposition / zoom.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst TWEAKS = /*EDITMODE-BEGIN*/{\n  \"palette\": \"blush\",\n  \"grain\": true,\n  \"notes\": true,\n  \"folios\": true,\n  \"binding\": false\n}/*EDITMODE-END*/;\n\nconst PALETTES = {\n  blush: {\n    label: \"Blush watercolour\",\n    swatch: [\"#e6a6a8\", \"#fbf4e6\", \"#3b3a52\", \"#b8cdb0\"],\n    vars: {\n      \"--paper\": \"#fbf4e6\", \"--paper-2\": \"#f4ead4\",\n      \"--ink\": \"#3b3a52\", \"--ink-soft\": \"#6f6c84\",\n      \"--rose\": \"#e6a6a8\", \"--peach\": \"#f4c89b\",\n      \"--sky\": \"#b6d3e0\", \"--sage\": \"#b8cdb0\",\n      \"--butter\": \"#f5e0a1\", \"--lilac\": \"#c9b8d8\",\n      \"--accent\": \"#c97f6f\",\n      \"--room-bg\": \"#efe6cf\", \"--room-bg-2\": \"#dcceb0\"\n    }\n  },\n  meadow: {\n    label: \"Meadow\",\n    swatch: [\"#7da683\", \"#fcf6e2\", \"#324236\", \"#e9b06b\"],\n    vars: {\n      \"--paper\": \"#fcf6e2\", \"--paper-2\": \"#f3e9c5\",\n      \"--ink\": \"#324236\", \"--ink-soft\": \"#5a6a5c\",\n      \"--rose\": \"#e9a8a8\", \"--peach\": \"#e9b06b\",\n      \"--sky\": \"#a8c7b8\", \"--sage\": \"#7da683\",\n      \"--butter\": \"#f1d76f\", \"--lilac\": \"#bcb1cf\",\n      \"--accent\": \"#a8633e\",\n      \"--room-bg\": \"#e3d8b3\", \"--room-bg-2\": \"#c4b78a\"\n    }\n  },\n  dusk: {\n    label: \"Dusk\",\n    swatch: [\"#9b8bc4\", \"#efe6ef\", \"#272447\", \"#d2a0b5\"],\n    vars: {\n      \"--paper\": \"#efe6ef\", \"--paper-2\": \"#e2d5e3\",\n      \"--ink\": \"#272447\", \"--ink-soft\": \"#534e72\",\n      \"--rose\": \"#d2a0b5\", \"--peach\": \"#e9b59b\",\n      \"--sky\": \"#b1bedc\", \"--sage\": \"#a8c0bd\",\n      \"--butter\": \"#ecd599\", \"--lilac\": \"#c5b3d8\",\n      \"--accent\": \"#9b6a86\",\n      \"--room-bg\": \"#cdc1d4\", \"--room-bg-2\": \"#aea1b8\"\n    }\n  },\n  vintage: {\n    label: \"Vintage\",\n    swatch: [\"#a8493a\", \"#f2e5c5\", \"#3a2a1d\", \"#8a9170\"],\n    vars: {\n      \"--paper\": \"#f2e5c5\", \"--paper-2\": \"#e5d4a8\",\n      \"--ink\": \"#3a2a1d\", \"--ink-soft\": \"#6c5a4a\",\n      \"--rose\": \"#c87a6c\", \"--peach\": \"#d9a160\",\n      \"--sky\": \"#a6b6b8\", \"--sage\": \"#8a9170\",\n      \"--butter\": \"#dcc36e\", \"--lilac\": \"#b29db2\",\n      \"--accent\": \"#a8493a\",\n      \"--room-bg\": \"#d4c595\", \"--room-bg-2\": \"#b8a575\"\n    }\n  }\n};\n\nfunction applyPalette(name) {\n  const p = PALETTES[name] || PALETTES.blush;\n  const root = document.documentElement;\n  Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));\n}\nfunction applyGrain(on)   { document.body.classList.toggle(\"no-grain\",   !on); }\nfunction applyNotes(on)   { document.body.classList.toggle(\"no-notes\",   !on); }\nfunction applyFolios(on)  { document.body.classList.toggle(\"no-folios\",  !on); }\nfunction applyBinding(on) { document.body.classList.toggle(\"heavy-binding\", on); }\n\nfunction renderSwatches() {\n  const host = document.getElementById(\"swatches\");\n  host.innerHTML = \"\";\n  Object.entries(PALETTES).forEach(([key, p]) => {\n    const el = document.createElement(\"div\");\n    el.className = \"swatch\" + (TWEAKS.palette === key ? \" active\" : \"\");\n    el.title = p.label;\n    el.dataset.key = key;\n    el.innerHTML =\n      '<span style=\"position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;\">' +\n      '<span style=\"background:' + p.swatch[0] + '\"><\u002Fspan>' +\n      '<span style=\"background:' + p.swatch[1] + '\"><\u002Fspan>' +\n      '<span style=\"background:' + p.swatch[3] + '\"><\u002Fspan>' +\n      '<span style=\"background:' + p.swatch[2] + '\"><\u002Fspan>' +\n      '<\u002Fspan>';\n    el.addEventListener(\"click\", () => {\n      TWEAKS.palette = key;\n      applyPalette(key);\n      renderSwatches();\n      persist({ palette: key });\n    });\n    host.appendChild(el);\n  });\n}\n\nfunction persist(edits) {\n  try { window.parent.postMessage({ type: \"__edit_mode_set_keys\", edits }, \"*\"); } catch (e) {}\n}\n\nfunction setupToggles() {\n  document.querySelectorAll(\"#tweaks .toggle\").forEach(t => {\n    const key = t.dataset.tweak;\n    t.classList.toggle(\"on\", !!TWEAKS[key]);\n    t.addEventListener(\"click\", () => {\n      TWEAKS[key] = !TWEAKS[key];\n      t.classList.toggle(\"on\", TWEAKS[key]);\n      applyAll();\n      persist({ [key]: TWEAKS[key] });\n    });\n  });\n}\n\nfunction applyAll() {\n  applyPalette(TWEAKS.palette);\n  applyGrain(TWEAKS.grain);\n  applyNotes(TWEAKS.notes);\n  applyFolios(TWEAKS.folios);\n  applyBinding(TWEAKS.binding);\n}\n\nconst panel = document.getElementById(\"tweaks\");\nwindow.addEventListener(\"message\", (e) => {\n  const data = e.data || {};\n  if (data.type === \"__activate_edit_mode\") panel.classList.add(\"visible\");\n  else if (data.type === \"__deactivate_edit_mode\") panel.classList.remove(\"visible\");\n});\npanel.querySelector('[data-action=\"close\"]').addEventListener(\"click\", () => {\n  panel.classList.remove(\"visible\");\n  try { window.parent.postMessage({ type: \"__edit_mode_dismissed\" }, \"*\"); } catch (e) {}\n});\n\nrenderSwatches();\nsetupToggles();\napplyAll();\n\ntry { window.parent.postMessage({ type: \"__edit_mode_available\" }, \"*\"); } catch (e) {}\n<\u002Fscript>\n\n<style>\n  body.no-grain .page::after { display: none; }\n  body.no-notes image-slot::part(empty) { opacity: 0; }\n  body.no-folios .folio { display: none; }\n  body.heavy-binding .book::before {\n    background: linear-gradient(90deg,\n      rgba(0,0,0,0) 0%,\n      rgba(40,20,10,0.42) 35%,\n      rgba(20,10,5,0.7) 50%,\n      rgba(40,20,10,0.42) 65%,\n      rgba(0,0,0,0) 100%);\n    width: 76px;\n  }\n<\u002Fstyle>\n\n\n\n<\u002Fbody><\u002Fhtml>"
